<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Test przycisku</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}

button{
    padding: 15px 25px;
    font-size: 16px;
    cursor: pointer;
}
</style>

</head>

<body>

<h2>Test zdarzeń myszy</h2>

<button id="testBtn">Test</button>

<script>
const btn = document.getElementById("testBtn");

btn.addEventListener("mouseenter", function() {
    alert("Najechałeś kursorem na przycisk");
});

btn.addEventListener("mouseleave", function() {
    alert("Kursor opuścił obszar przycisku");
});
</script>

</body>
</html>
